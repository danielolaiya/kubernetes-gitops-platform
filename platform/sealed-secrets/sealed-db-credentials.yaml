# How to create a sealed secret:
#
# 1. First create a regular secret locally (never commit this):
#    kubectl create secret generic db-credentials \
#      --from-literal=username=myuser \
#      --from-literal=password=supersecret \
#      --dry-run=client -o yaml > /tmp/secret.yaml
#
# 2. Seal it using kubeseal:
#    kubeseal --format yaml < /tmp/secret.yaml > sealed-db-credentials.yaml
#
# 3. Commit the sealed version, bin the plain text one
#    git add sealed-db-credentials.yaml && git commit
#
# The sealed secret below is an example of what the output looks like.
# The encrypted values are safe to store in git.
# Only the controller in the cluster can decrypt them.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-credentials
  namespace: production
  # namespace is baked into the encryption so you cant just copy a sealed
  # secret from staging to production and have it work, which is intentional
spec:
  encryptedData:
    # these values are just examples, real ones come from kubeseal
    username: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
    password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
  template:
    metadata:
      name: db-credentials
      namespace: production
    type: Opaque
