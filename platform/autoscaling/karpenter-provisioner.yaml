apiVersion: karpenter.sh/v1alpha5
kind: Provisioner
metadata:
  name: default
  namespace: karpenter
spec:
  requirements:
    - key: karpenter.sh/capacity-type
      operator: In
      # mix spot and on-demand. spot saves ~70% on cost for stateless workloads.
      # on-demand is the fallback when spot capacity is unavailable.
      values: ["spot", "on-demand"]
    - key: node.kubernetes.io/instance-type
      operator: In
      values:
        - m6i.large
        - m6i.xlarge
        - m6i.2xlarge
        - m6a.large
        - m6a.xlarge
        - m5.large
        - m5.xlarge
    - key: topology.kubernetes.io/zone
      operator: In
      values:
        - eu-west-1a
        - eu-west-1b
        - eu-west-1c
    - key: kubernetes.io/arch
      operator: In
      values: ["amd64"]

  limits:
    resources:
      cpu: "1000"
      memory: 4000Gi

  providerRef:
    name: default

  consolidation:
    enabled: true

  # 30 days max node age forces regular rotation and keeps nodes patched
  ttlSecondsUntilExpired: 2592000
  # scale down empty nodes after 30 seconds to keep costs tight
  ttlSecondsAfterEmpty: 30

  labels:
    managed-by: karpenter
    environment: production

---
apiVersion: karpenter.k8s.aws/v1alpha1
kind: AWSNodeTemplate
metadata:
  name: default
  namespace: karpenter
spec:
  subnetSelector:
    kubernetes.io/role/internal-elb: "1"
  securityGroupSelector:
    karpenter.sh/discovery: production-eks
  instanceProfile: KarpenterNodeInstanceProfile-production
  amiFamily: AL2

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
        deleteOnTermination: true

  tags:
    Environment: production
    ManagedBy: karpenter
